<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>Weather Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <h2 class="text-center mb-4">Weather Dashboard</h2>

        <div class="row justify-content-center">

            <div class="col-md-6">

                <input id="cityInput" class="form-control mb-3" placeholder="Buscar ciudad">

                <button class="btn btn-primary w-100 mb-2" onclick="searchCity()">
                    Buscar
                </button>

                <button class="btn btn-secondary w-100 mb-4" onclick="useLocation()">
                    Usar mi ubicación
                </button>

                <div id="recentSearches"></div>

                <div id="weatherResult" class="card p-3 mt-4"></div>

            </div>

        </div>

    </div>

    <script src="/js/dashboard.js"></script>

</body>

</html>
